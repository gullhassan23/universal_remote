name: smartapp
description: Flutter Universal TV Remote App (Samsung first, extensible to other brands).
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & routing
  get: ^4.6.6

  # Network info (WiFi IP, gateway, etc.)
  network_info_plus: ^6.1.0
  flutter_secure_storage: ^10.0.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3
  in_app_purchase: ^3.2.0
  flutter_dotenv: ^5.2.1

  # HTTP client for discovery (REST probe on port 8001)
  http: ^1.2.2

  # firebase
  firebase_core: ^4.6.0

  # mDNS discovery for Android TV Remote (_androidtvremote._tcp)
  multicast_dns: ^0.3.2

  # WebSocket client for Samsung TV control (port 8002)
  web_socket_channel: ^3.0.1

  # Local storage for last connected TV and tokens
  shared_preferences: ^2.3.2
  smooth_page_indicator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
